# SignSpeak v2 — Training Configuration
# Edit this file before running any pipeline script.

# ─── Data paths ──────────────────────────────────────────────────────────────
data:
  ms_asl_root:    "C:/Web-Dev/Datasets/MS-ASL"
  videos_dir:     "C:/Web-Dev/Datasets/MS-ASL/videos"
  processed_dir:  "C:/Web-Dev/Datasets/MS-ASL/processed"
  landmarks_dir:  "C:/Web-Dev/Datasets/MS-ASL/landmarks"
  dataset_path:   "C:/Web-Dev/Datasets/MS-ASL/processed/dataset.h5"
  label_map_out:  "C:/Web-Dev/Datasets/MS-ASL/processed/label_map.json"

# ─── Selected classes ─────────────────────────────────────────────────────────
classes:
  - hello
  - "yes"
  - "no"
  - help
  - good

# ─── Download ─────────────────────────────────────────────────────────────────
download:
  max_per_class_per_split: 10

# ─── Preprocessing ───────────────────────────────────────────────────────────
preprocessing:
  frame_count: 32
  feature_size: 126
  min_clip_frames: 8
  min_valid_frame_ratio: 0.40

# ─── Model ───────────────────────────────────────────────────────────────────
model:
  num_classes: 20    # must match len(hf_dataset.selected_classes)
  tcn_filters: [64, 128, 256]
  tcn_kernel_size: 3
  dropout: 0.3
  use_residuals: true

# ─── Training ────────────────────────────────────────────────────────────────
training:
  epochs: 80
  batch_size: 32
  learning_rate: 1.0e-3
  lr_patience: 8
  early_stop_patience: 20
  val_split: 0.15
  test_split: 0.15
  seed: 42
  output_dir: "models/tcn_v2"

# ─── Export ──────────────────────────────────────────────────────────────────
export:
  tfjs_output_dir: "../public/v2/model"
  quantize: false

# ─── Hugging Face ASL Dataset ─────────────────────────────────────────────────
hf_dataset:
  enabled: true
  repo_id: "akasheroor/American-Sign-Language-Dataset"
  repo_type: "dataset"
  root_dir: "C:/Web-Dev/Datasets/HF-ASL"
  csv_filename: "Aslense Dataset.csv"
  csv_path: "C:/Web-Dev/Datasets/HF-ASL/Aslense Dataset.csv"
  selected_videos_dir: "C:/Web-Dev/Datasets/HF-ASL/selected_videos"
  landmarks_dir: "C:/Web-Dev/Datasets/HF-ASL/landmarks"
  dataset_path: "C:/Web-Dev/Datasets/HF-ASL/dataset.h5"
  label_map_out: "C:/Web-Dev/Datasets/HF-ASL/label_map.json"
  manifest_path: "C:/Web-Dev/Datasets/HF-ASL/hf_manifest.csv"

  selected_classes:
    - "HELLO"
    - "YES"
    - "NO"
    - "HELP"
    - "THANKYOU"
    - "PLEASE"
    - "SORRY"
    - "GOOD"
    - "STOP"
    - "WATER"
    - "ME"
    - "YOU"
    - "WANT"
    - "NEED"
    - "FOOD"
    - "MORE"
    - "BATHROOM"
    - "HOME"
    - "SICK"
    - "WHERE"

  # ── Balancing ───────────────────────────────────────────────────────────────
  # max_per_class controls how many clips per class enter the pipeline.
  # Increase toward 80 to improve accuracy — especially for weak classes:
  #   GOOD, STOP, HELLO, THANKYOU have the fewest HF-ASL clips available.
  # Classes with fewer videos than this cap will use all available clips.
  max_per_class: 80
  balance_strategy: "cap"

  # ── Class aliases ─────────────────────────────────────────────────────────
  # Each key is a canonical class from selected_classes.
  # Values list dataset label variants that should map to the canonical class.
  # The canonical name itself MUST appear in the list to match its own entries.
  class_aliases:
    THANKYOU:
      - "THANKYOU"
      - "THANK YOU"
    ME:
      - "ME"
      - "I"
    FOOD:
      - "FOOD"
      - "EAT"
    BATHROOM:
      - "BATHROOM"
      - "TOILET"
    HOME:
      - "HOME"
    SICK:
      - "SICK"
    STOP:
      - "STOP"

  # ── Rejected aliases (pending manual sample review) ──────────────────────
  # U → YOU:   REJECTED — U may represent the alphabet letter U, not the
  #            pronoun YOU. Use only YOU unless manual review confirms
  #            U-labelled videos are actually YOU signs.
  # HOUSE → HOME: REJECTED — HOUSE and HOME may be visually/sign-
  #            linguistically different depending on the source. Use only
  #            HOME unless manual review confirms they are compatible.

  # ── Display labels (internal label → UI string) ──────────────────────────
  display_labels:
    ME:       "I / ME"
    FOOD:     "FOOD / EAT"
    BATHROOM: "BATHROOM"
    THANKYOU: "THANK YOU"

# ─── Data Augmentation (applied to the training split during dataset build, off by default) ────────────────────
# Enable these to improve generalisation for weak/low-data classes.
# All defaults are conservative; enable one at a time and evaluate.
augmentation:
  enabled: false                # master switch — set true to enable any augmentation

  # Landmark coordinate jitter: add Gaussian noise to each x/y/z coordinate.
  # Simulates slight signer-position variance. Recommended sigma: 0.01–0.03.
  landmark_jitter:
    enabled: false
    sigma: 0.01                 # std-dev of Gaussian noise (in normalised units)
    copies: 1                   # augmented copies to generate per sample

  # Temporal jitter: randomly drop/duplicate normalized frames to simulate speed variance.
  # Applied after the train/val/test split to avoid validation/test leakage.
  temporal_jitter:
    enabled: false
    max_speed_ratio: 1.10       # max temporal stretch/compress factor
    copies: 1

  # Horizontal flip (handedness normalisation): mirror x-coordinates.
  # Only safe if the dataset does not mix left/right hand signers for the same class.
  # Set enabled: true only after verifying your dataset is consistently right-hand.
  horizontal_flip:
    enabled: false
